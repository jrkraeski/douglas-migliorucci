  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" stroke=\"#dd6d5c\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div style=\"display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px;\">\n      <span style=\"width: 20px; height: 1px; background: #3e7180;\"><\u002Fspan>\n      <span style=\"font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #3e7180; font-weight: 500;\">Identidade Visual<\u002Fspan>\n      <span style=\"width: 20px; height: 1px; background: #3e7180;\"><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family: 'Lora', serif; font-size: clamp(36px, 5vw, 58px); font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 20px;\">Douglas Migliorucci<\u002Fh1>\n    <p style=\"font-size: 17px; color: #718c93; max-width: 480px; margin: 0 auto; line-height: 1.6;\">Guia de marca — como usar a logo, cores, tipografia e aplicações do consultório de forma consistente, em qualquer material.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═══ 01 LOGO ═══ -->\n<section id=\"logo\" style=\"background: #faf9f6; padding: 96px 0;\">\n  <div class=\"wrap\">\n    <div class=\"sec-label\"><span class=\"sec-num\">01<\u002Fspan><span style=\"font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #3e7180; font-weight: 500;\">Logo<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family: 'Lora', serif; font-size: clamp(26px, 3vw, 36px); font-weight: 600; letter-spacing: -0.02em; margin-bottom: 16px; max-width: 620px;\">Um emblema — não um ícone solto. O bastão, a serpente entrelaçada em duas cores e o tridente, cravados num medalhão sólido.<\u002Fh2>\n    <p style=\"font-size: 15px; color: #718c93; max-width: 560px; margin-bottom: 48px; line-height: 1.6;\">A moldura circular e o preenchimento sólido dão peso de selo profissional — a mesma linguagem de brasões de conselhos e instituições de saúde, sem perder o traço autoral da serpente bicolor.<\u002Fp>\n\n    <!-- Primary lockup -->\n    <div style=\"background: #edeae4; border-radius: 8px; padding: 64px 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;\">\n      <div style=\"display: flex; align-items: center; gap: 26px;\">\n        <svg width=\"76\" height=\"76\" viewBox=\"0 0 100 100\" style=\"filter: drop-shadow(0 8px 16px rgba(65,96,98,0.22));\">\n          <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#2a3330\" stroke-width=\"1\" opacity=\"0.15\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"41\" fill=\"#416062\"><\u002Fcircle>\n          <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#edeae4\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M6 12 L6 8 M12 10 L12 4 M18 12 L18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M6 8 Q12 6 18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#d4b6a0\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n        <div>\n          <div style=\"font-family: 'Lora', serif; font-weight: 600; font-size: 32px; color: #2a3330; letter-spacing: -0.01em; line-height: 1.1;\">Douglas Migliorucci<\u002Fdiv>\n          <div style=\"font-size: 11px; color: #718c93; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 8px;\">Psicólogo Clínico<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-4\" style=\"margin-bottom: 56px;\">\n      <!-- Icon only (medallion) -->\n      <div style=\"background: #edeae4; border-radius: 8px; padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <svg width=\"58\" height=\"58\" viewBox=\"0 0 100 100\">\n          <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#2a3330\" stroke-width=\"1\" opacity=\"0.15\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"41\" fill=\"#416062\"><\u002Fcircle>\n          <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#edeae4\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M6 12 L6 8 M12 10 L12 4 M18 12 L18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M6 8 Q12 6 18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#d4b6a0\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n        <span style=\"font-size: 11px; color: #97aba6;\">Medalhão / avatar<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Reversed terracota fill -->\n      <div style=\"background: #faf9f6; border: 1px solid #e4e0d9; border-radius: 8px; padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <svg width=\"58\" height=\"58\" viewBox=\"0 0 100 100\">\n          <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#2a3330\" stroke-width=\"1\" opacity=\"0.15\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"41\" fill=\"#dd6d5c\"><\u002Fcircle>\n          <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#fff\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M6 12 L6 8 M12 10 L12 4 M18 12 L18 8\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M6 8 Q12 6 18 8\" stroke=\"#fff\" stroke-width=\"1.9\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"rgba(255,255,255,0.75)\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"rgba(255,255,255,0.55)\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n        <span style=\"font-size: 11px; color: #97aba6;\">Variante terracota<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Monochrome ink outline -->\n      <div style=\"background: #edeae4; border: 1px solid #e4e0d9; border-radius: 8px; padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <svg width=\"58\" height=\"58\" viewBox=\"0 0 100 100\">\n          <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#2a3330\" stroke-width=\"1.6\"><\u002Fcircle>\n          <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#2a3330\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M6 12 L6 8 M12 10 L12 4 M18 12 L18 8\" stroke=\"#2a3330\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M6 8 Q12 6 18 8\" stroke=\"#2a3330\" stroke-width=\"1.9\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#2a3330\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#2a3330\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n        <span style=\"font-size: 11px; color: #97aba6;\">Monocromática / carimbo<\u002Fspan>\n      <\u002Fdiv>\n      <!-- Compact bare symbol for small use -->\n      <div style=\"background: #edeae4; border-radius: 8px; padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;\">\n        <svg width=\"26\" height=\"35\" viewBox=\"0 0 24 32\" fill=\"none\">\n          <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#416062\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fline>\n          <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#3e7180\" stroke-width=\"2.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.6\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <span style=\"font-size: 11px; color: #97aba6;\">Compacto — abaixo de 32px<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Clearspace + minimum size -->\n    <div class=\"grid-2\">\n      <div style=\"background: #fff; border-radius: 8px; padding: 32px;\">\n        <div style=\"font-family: 'Lora', serif; font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #416062;\">Área de proteção<\u002Fdiv>\n        <p style=\"font-size: 14px; color: #4a5550; line-height: 1.65; margin-bottom: 20px;\">Mantenha ao redor da logo um espaço livre equivalente à largura do \"D\" do monograma. Não posicione texto, bordas ou outros elementos dentro dessa área.<\u002Fp>\n        <div style=\"border: 1.5px dashed #97aba6; border-radius: 6px; padding: 24px; display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"44\" height=\"44\" viewBox=\"0 0 100 100\">\n            <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"#2a3330\" stroke-width=\"1\" opacity=\"0.15\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"41\" fill=\"#416062\"><\u002Fcircle>\n            <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n              <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#edeae4\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n              <path d=\"M6 12 L6 8 M12 10 L12 4 M18 12 L18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M6 8 Q12 6 18 8\" stroke=\"#edeae4\" stroke-width=\"1.9\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#d4b6a0\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #fff; border-radius: 8px; padding: 32px;\">\n        <div style=\"font-family: 'Lora', serif; font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #416062;\">Tamanho mínimo<\u002Fdiv>\n        <p style=\"font-size: 14px; color: #4a5550; line-height: 1.65; margin-bottom: 20px;\">O medalhão não deve ser reproduzido abaixo de 32px (digital) ou 10mm (impresso). Abaixo disso, use o símbolo compacto sem a moldura circular.<\u002Fp>\n        <div style=\"display: flex; align-items: center; gap: 24px;\">\n          <svg width=\"24\" height=\"32\" viewBox=\"0 0 24 32\" fill=\"none\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#416062\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#3e7180\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n          <span style=\"font-family: 'Lora', serif; font-weight: 700; font-size: 20px; color: #416062;\">DM<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n
