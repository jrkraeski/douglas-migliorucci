  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv style=\"display: flex; justify-content: space-between; align-items: flex-start;\">\n        <span style=\"font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: {{ edu.label }}; font-weight: 500;\">Você Sabia?<\u002Fspan>\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 100 100\">\n          <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"{{ edu.ink }}\" stroke-width=\"1.4\" opacity=\"0.5\"><\u002Fcircle>\n          <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n            <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"{{ edu.ink }}\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n            <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"#d4b6a0\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"#dd6d5c\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family: 'Lora', serif; font-weight: 600; font-size: 26px; color: {{ edu.ink }}; line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 16px;\">{{ edu.headline }}<\u002Fdiv>\n        <div style=\"font-size: 13px; color: {{ edu.body }}; line-height: 1.55;\">{{ edu.text }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 11px; color: {{ edu.label }}; letter-spacing: 0.04em;\">{{ handle }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- POST 2: CITAÇÃO -->\n  <div class=\"post\" style=\"background: {{ quote.bg }};\">\n    <div style=\"position: absolute; inset: 0; padding: 36px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 20px;\">\n      <svg width=\"42\" height=\"42\" viewBox=\"0 0 100 100\">\n        <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"none\" stroke=\"{{ quote.ink }}\" stroke-width=\"1\" opacity=\"0.15\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"50\" r=\"41\" fill=\"#416062\"><\u002Fcircle>\n        <g transform=\"translate(50,50) scale(1.92) translate(-12,-17)\">\n          <line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"30\" stroke=\"#edeae4\" stroke-width=\"2.3\" stroke-linecap=\"round\"><\u002Fline>\n          <path d=\"M12 13 C18 17 18 21 12 25\" stroke=\"{{ quote.accent1 }}\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M12 25 C6 29 6 30 12 30\" stroke=\"{{ quote.accent2 }}\" stroke-width=\"2.3\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fsvg>\n      <div style=\"font-family: 'Lora', serif; font-style: italic; font-weight: 500; font-size: 21px; color: {{ quote.ink }}; line-height: 1.4;\">\"{{ quote.text }}\"<\u002Fdiv>\n      <div style=\"font-size: 11px; color: {{ quote.sub }}; letter-spacing: 0.06em; text-transform: uppercase;\">— Douglas Migliorucci<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- POST 3: DISPONIBILIDADE -->\n  <div class=\"post\" style=\"background: {{ avail.bg }};\">\n    <div style=\"position: absolute; inset: 0; padding: 34px; display: flex; flex-direction: column; justify-content: space-between;\">\n      <span style=\"font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: {{ avail.label }}; font-weight: 500;\">Atendimento<\u002Fspan>\n      <div>\n        <div style=\"font-family: 'Lora', serif; font-weight: 600; font-size: 28px; color: {{ avail.ink }}; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 14px;\">{{ avail.headline }}<\u002Fdiv>\n        <div style=\"font-size: 13px; color: {{ avail.body }}; line-height: 1.6; margin-bottom: 20px;\">{{ avail.text }}<\u002Fdiv>\n        <div style=\"display: inline-block; background: {{ avail.cta }}; color: #fff; font-size: 12px; font-weight: 500; padding: 10px 20px; border-radius: 3px;\">Agende pelo WhatsApp<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 11px; color: {{ avail.label }}; letter-spacing: 0.04em;\">{{ handle }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1060, &quot;height&quot;: 420}, &quot;handle&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;@psidouglasmigliorucci&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Geral&quot;}, &quot;eduTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;petroleo&quot;, &quot;options&quot;: [&quot;petroleo&quot;, &quot;bege&quot;, &quot;terracota&quot;, &quot;escuro&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Educativo&quot;}, &quot;eduHeadline&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Ansiedade não é falta de força de vontade.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Educativo&quot;}, &quot;eduText&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;É uma resposta do seu sistema nervoso ao ambiente. Compreender essa relação é o primeiro passo para lidar com ela.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Educativo&quot;}, &quot;quoteText&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Uma psicologia que transforma através da compreensão das relações entre o indivíduo e seu ambiente.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Citação&quot;}, &quot;availTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;terracota&quot;, &quot;options&quot;: [&quot;petroleo&quot;, &quot;bege&quot;, &quot;terracota&quot;, &quot;escuro&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Disponibilidade&quot;}, &quot;availHeadline&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Horários abertos esta semana&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Disponibilidade&quot;}, &quot;availText&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Atendimento presencial em Araçatuba/SP e online. Consulte a disponibilidade.&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Post Disponibilidade&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const eduTheme = this.props.eduTheme ?? 'petroleo';\n    const availTheme = this.props.availTheme ?? 'terracota';\n    const themes = {\n      petroleo: { bg: '#3e7180', ink: '#ffffff', label: 'rgba(255,255,255,0.65)', body: 'rgba(255,255,255,0.85)' },\n      bege:     { bg: '#decfc1', ink: '#2a3330', label: '#718c93', body: '#4a5550' },\n      terracota:{ bg: '#dd6d5c', ink: '#ffffff', label: 'rgba(255,255,255,0.65)', body: 'rgba(255,255,255,0.9)' },\n      escuro:   { bg: '#416062', ink: '#edeae4', label: 'rgba(237,234,228,0.55)', body: 'rgba(237,234,228,0.8)' },\n    };\n    return {\n      handle: this.props.handle ?? '@psidouglasmigliorucci',\n      edu: {\n        ...themes[eduTheme],\n        headline: this.props.eduHeadline ?? 'Ansiedade não é falta de força de vontade.',\n        text: this.props.eduText ?? 'É uma resposta do seu sistema nervoso ao ambiente. Compreender essa relação é o primeiro passo para lidar com ela.',\n      },\n      quote: {\n        bg: '#edeae4', ink: '#2a3330', sub: '#97aba6', accent1: '#3e7180', accent2: '#dd6d5c',\n        text: this.props.quoteText ?? 'Uma psicologia que transforma através da compreensão das relações entre o indivíduo e seu ambiente.',\n      },\n      avail: {\n        ...themes[availTheme],\n        cta: '#2a3330',\n        headline: this.props.availHeadline ?? 'Horários abertos esta semana',\n        text: this.props.availText ?? 'Atendimento presencial em Araçatuba/SP e online. Consulte a disponibilidade.',\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
